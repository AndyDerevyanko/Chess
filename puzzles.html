<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Puzzles &mdash; Offline Chess</title>
		<link rel="stylesheet" href="./styles/retro.css">
	</head>
	<body>
		<div class="poster-frame">
			<main class="page">

				<nav class="topnav">
					<a class="nav-link" href="./index.html"><i class="icon" data-icon="chevronLeft"></i> Home</a>
					<span class="nav-title">Puzzles</span>
					<a class="nav-link" href="./settings.html">Settings</a>
				</nav>

				<div class="panel" style="margin-top: 6px;">
					<div class="panel-title">Puzzle Progress</div>
					<div class="stack-sm">
						<div class="puzzle-tier" data-tier="beginner" data-total="25">
							<div class="tier-row">
								<span class="tier-name">Beginner</span>
								<span class="tier-count"><span class="tier-solved">0</span> / 25 Solved</span>
							</div>
							<div class="progress-track"><div class="progress-fill"></div></div>
						</div>
						<div class="puzzle-tier" data-tier="intermediate" data-total="25">
							<div class="tier-row">
								<span class="tier-name">Intermediate</span>
								<span class="tier-count"><span class="tier-solved">0</span> / 25 Solved</span>
							</div>
							<div class="progress-track"><div class="progress-fill"></div></div>
						</div>
						<div class="puzzle-tier" data-tier="advanced" data-total="25">
							<div class="tier-row">
								<span class="tier-name">Advanced</span>
								<span class="tier-count"><span class="tier-solved">0</span> / 25 Solved</span>
							</div>
							<div class="progress-track"><div class="progress-fill"></div></div>
						</div>
						<div class="puzzle-tier" data-tier="master" data-total="25">
							<div class="tier-row">
								<span class="tier-name">Master</span>
								<span class="tier-count"><span class="tier-solved">0</span> / 25 Solved</span>
							</div>
							<div class="progress-track"><div class="progress-fill"></div></div>
						</div>
					</div>
				</div>

				<p class="tagline">&#9813; Offline Chess &#9813;</p>
			</main>
		</div>

		<script src="./scripts/icons.js"></script>
		<script src="./scripts/ui.js"></script>
	</body>
</html>
