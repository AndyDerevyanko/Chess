<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Game Setup &mdash; Offline Chess</title>
		<link rel="stylesheet" href="./styles/retro.css">
	</head>
	<body>
		<div class="poster-frame">
			<main class="page">

				<nav class="topnav">
					<a class="nav-link" href="./index.html"><i class="icon" data-icon="chevronLeft"></i> Home</a>
					<span class="nav-title">Game Setup</span>
					<a class="nav-link" href="./archive.html">Archive</a>
				</nav>

				<p class="page-sub" style="margin-top: 6px;">Select a Mode, Pick Your Side.</p>

				<div class="card-grid" style="margin-bottom: 22px;">
					<div class="mode-card" data-mode="bot" role="button" tabindex="0">
						<i class="icon" data-icon="bot"></i>
						<h3>Local vs Bot</h3>
					</div>
					<div class="mode-card selected" data-mode="pass" role="button" tabindex="0">
						<i class="icon" data-icon="players"></i>
						<h3>Pass &amp; Play</h3>
						<p>Hand the device over after each move.</p>
					</div>
				</div>

				<div class="panel">
					<div class="panel-title">Play As</div>
					<div class="choice-row">
						<button class="choice selected">&#9812; White</button>
						<button class="choice">&#9818; Black</button>
						<button class="choice"><i class="icon" data-icon="dice"></i> Random</button>
					</div>
				</div>

				<div class="panel">
					<div class="panel-title">
						Bot Difficulty
						<span class="badge muted">Bot Mode Only</span>
					</div>
					<div class="choice-row">
						<button class="choice selected" data-difficulty="novice">Novice</button>
						<button class="choice" data-difficulty="club">Club</button>
						<button class="choice" data-difficulty="master">Master</button>
						<button class="choice locked" data-toast="Engine difficulty coming soon">Engine</button>
					</div>
				</div>

				<div class="panel">
					<div class="panel-title">
						Time Control
						<span class="badge muted" id="tc-badge">No Clock</span>
					</div>
					<div class="tc-group">
						<span class="tc-group-label">Bullet</span>
						<div class="choice-row">
							<button class="choice" data-tc="60+0">1 min</button>
							<button class="choice" data-tc="60+1">1 | 1</button>
							<button class="choice" data-tc="120+1">2 | 1</button>
						</div>
					</div>
					<div class="tc-group">
						<span class="tc-group-label">Blitz</span>
						<div class="choice-row">
							<button class="choice" data-tc="180+0">3 min</button>
							<button class="choice" data-tc="180+2">3 | 2</button>
							<button class="choice" data-tc="300+0">5 min</button>
							<button class="choice" data-tc="300+2">5 | 2</button>
							<button class="choice" data-tc="300+5">5 | 5</button>
						</div>
					</div>
					<div class="tc-group">
						<span class="tc-group-label">Rapid</span>
						<div class="choice-row">
							<button class="choice" data-tc="600+0">10 min</button>
							<button class="choice" data-tc="600+5">10 | 5</button>
							<button class="choice" data-tc="900+10">15 | 10</button>
							<button class="choice" data-tc="1200+0">20 min</button>
							<button class="choice" data-tc="1800+0">30 min</button>
							<button class="choice" data-tc="3600+0">60 min</button>
						</div>
					</div>
					<div class="tc-group">
						<span class="tc-group-label">Other</span>
						<div class="choice-row">
							<button class="choice selected" data-tc="none">&#8734; Unlimited</button>
							<button class="choice" data-tc="custom"><i class="icon" data-icon="settings"></i> Custom</button>
						</div>
					</div>
					<div class="tc-custom" id="tc-custom-row" hidden>
						<label>Minutes <input type="number" id="tc-custom-min" min="1" max="180" step="1" value="10"></label>
						<label>Increment (sec) <input type="number" id="tc-custom-inc" min="0" max="60" step="1" value="0"></label>
					</div>
				</div>

				<a id="start-game-btn" class="menu-btn primary" href="./game.html?mode=pass" style="width: min(440px,100%);">
					<i class="icon" data-icon="play"></i> To The Board
				</a>

				<p class="tagline">&#9813; Offline Chess &#9813;</p>
			</main>
		</div>

		<script src="./scripts/icons.js"></script>
		<script src="./scripts/clock.js"></script>
		<script src="./scripts/ui.js"></script>
	</body>
</html>
